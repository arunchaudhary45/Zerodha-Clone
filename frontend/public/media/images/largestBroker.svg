<svg xmlns="http://www.w3.org/2000/svg" width="500" height="350" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#f8f9fa" rx="8"/>
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="22" fill="#333" text-anchor="middle" font-weight="bold">India's #1 Stock Broker</text>
  <!-- Growth chart -->
  <polyline points="50,280 100,260 150,250 200,220 250,200 300,160 350,120 400,80 450,50" fill="none" stroke="#387ed1" stroke-width="3"/>
  <circle cx="450" cy="50" r="5" fill="#e95325"/>
  <!-- Stats -->
  <text x="100" y="320" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">2010</text>
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">2017</text>
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">2024</text>
  <text x="250" y="150" font-family="Arial, sans-serif" font-size="40" fill="#387ed1" text-anchor="middle" font-weight="bold" opacity="0.15">1.3+ Cr</text>
  <text x="250" y="180" font-family="Arial, sans-serif" font-size="14" fill="#387ed1" text-anchor="middle" opacity="0.4">Active Clients</text>
</svg>
